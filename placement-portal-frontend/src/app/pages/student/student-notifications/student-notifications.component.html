<div class="app-layout">
  <app-sidebar></app-sidebar>

  <div class="main-area">
    <app-navbar pageTitle="Notifications"
                pageSubtitle="All your updates in one place"></app-navbar>

    <div class="page-body">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <span *ngIf="unreadCount > 0" class="chip chip-danger">
            {{ unreadCount }} unread
          </span>
          <span *ngIf="unreadCount === 0" class="chip chip-success">
            All caught up
          </span>
        </div>
        <button class="btn btn-outline-primary btn-sm"
                *ngIf="unreadCount > 0" (click)="markAllRead()">
          <i class="bi bi-check-all"></i> Mark all read
        </button>
      </div>

      <app-loader *ngIf="loading"></app-loader>

      <div class="empty-state card" *ngIf="!loading && notifications.length === 0">
        <i class="bi bi-bell-slash"></i>
        <p>No notifications yet. We'll ping you when there's news!</p>
      </div>

      <div class="card p-0" *ngIf="!loading && notifications.length > 0"
           style="overflow: hidden;">
        <div *ngFor="let n of notifications; let last = last"
             class="notification-item"
             [class.unread]="!n.read"
             [style.border-bottom]="last ? 'none' : '1px solid var(--line)'"
             (click)="markRead(n.id)">
          <div class="notif-icon">
            <i class="bi bi-bell-fill"></i>
          </div>
          <div class="flex-grow-1">
            <div class="notif-message"
                 [style.font-weight]="!n.read ? '600' : '500'">
              {{ n.message }}
            </div>
            <div class="notif-time">
              {{ n.createdAt | date:'MMM d, h:mm a' }}
            </div>
          </div>
          <span *ngIf="!n.read" class="unread-dot"></span>
        </div>
      </div>

    </div>
  </div>
</div>
