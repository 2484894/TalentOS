<div class="modal-overlay" *ngIf="applicationId" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-head">
      <div>
        <div class="modal-eyebrow">Schedule interview</div>
        <h3>{{ candidateName || 'Candidate' }}</h3>
      </div>
      <button type="button" class="modal-close" (click)="cancel()" aria-label="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body">
      <p class="modal-hint">
        Propose up to 3 time slots. The candidate will pick one to confirm.
      </p>

      <div class="alert alert-danger" *ngIf="errorMsg">
        <i class="bi bi-exclamation-circle-fill"></i> {{ errorMsg }}
      </div>

      <div class="slot-input" *ngFor="let _ of slots; let i = index">
        <label>Slot {{ i + 1 }}<span *ngIf="i === 0" class="required-hint"> · required</span></label>
        <input type="datetime-local"
               [(ngModel)]="slots[i]"
               [min]="minDateTime"
               class="form-control" />
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-soft" (click)="cancel()" [disabled]="saving">
        Cancel
      </button>
      <button type="button" class="btn btn-primary"
              [disabled]="saving || !hasAnySlot"
              (click)="send()">
        <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
        <i *ngIf="!saving" class="bi bi-send-fill"></i>
        {{ saving ? 'Sending…' : 'Send to candidate' }}
      </button>
    </div>

  </div>
</div>
